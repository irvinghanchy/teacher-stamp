<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>老師印章產生器</title>
  <link rel="stylesheet" href="webfont/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">  <style>
    /* ── Reset ──────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Variables ──────────────────────────── */
    :root {
      --black:   #0d0d0d;
      --white:   #f0f0f0;
      --yellow:  #F5C518;
      --yello-d: #c9a010;
      --g1:      #181818;
      --g2:      #242424;
      --g3:      #333;
      --g4:      #555;
    }

    /* ── Base ───────────────────────────────── */
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Courier New', 'Lucida Console', monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────── */
    .hdr {
      background: var(--yellow);
      color: var(--black);
      padding: .75rem 1.5rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      border-bottom: 4px solid var(--black);
      flex-shrink: 0;
    }
    .hdr h1 {
      font-size: clamp(.95rem, 2.8vw, 1.45rem);
      font-weight: 900;
      letter-spacing: .18em;
    }
    .hdr small {
      font-size: .62rem;
      opacity: .65;
      letter-spacing: .14em;
    }

    /* ── Layout ─────────────────────────────── */
    .main {
      display: grid;
      grid-template-columns: minmax(260px, 340px) 1fr;
      flex: 1;
      min-height: 0;
    }

    /* ── Controls ───────────────────────────── */
    .ctrl {
      background: var(--g1);
      border-right: 3px solid var(--g3);
      overflow-y: auto;
    }
    .ctrl-inner {
      padding: 1.1rem 1.1rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    /* ── Field ──────────────────────────────── */
    .field { display: flex; flex-direction: column; gap: .4rem; }
    .fl {
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--yellow);
    }

    textarea {
      background: var(--g2);
      border: 2px solid var(--g3);
      color: var(--white);
      padding: .6rem .75rem;
      /* font-family: 'Times New Roman', Times, 'PT Serif', '標楷體','DFKai-SB','BiauKai', 'TW-Kai-98_1', serif; */
      font-size: 1.05rem;
      resize: vertical;
      min-height: 72px;
      width: 100%;
      line-height: 1.7;
      transition: border-color .12s;
    }
    textarea:focus { outline: none; border-color: var(--yellow); }
    textarea::placeholder { color: var(--g4); }

    /* ── Option buttons ─────────────────────── */
    .opts { display: flex; flex-wrap: wrap; gap: .35rem; }
    .opt {
      padding: .3rem .65rem;
      background: var(--g2);
      border: 2px solid var(--g3);
      color: var(--white);
      font-family: inherit;
      font-size: .78rem;
      cursor: pointer;
      transition: border-color .1s, background .1s, color .1s;
      white-space: nowrap;
    }
    .opt:hover { border-color: var(--yellow); }
    .opt.active {
      background: var(--yellow);
      border-color: var(--yellow);
      color: var(--black);
      font-weight: 700;
    }

    /* ── Sliders ────────────────────────────── */
    .slide-row {
      display: flex;
      align-items: center;
      gap: .65rem;
    }
    input[type="range"] {
      flex: 1;
      accent-color: var(--yellow);
      cursor: pointer;
    }
    .slide-val {
      font-size: .78rem;
      font-weight: 700;
      color: var(--yellow);
      min-width: 3.8em;
      text-align: right;
    }

    /* ── Divider ────────────────────────────── */
    .div { height: 2px; background: var(--g3); }

    /* ── Buttons ────────────────────────────── */
    .btn-gen {
      background: var(--yellow);
      border: none;
      color: var(--black);
      padding: .7rem 1rem;
      font-family: inherit;
      font-size: .85rem;
      font-weight: 900;
      letter-spacing: .18em;
      cursor: pointer;
      width: 100%;
      transition: background .1s;
    }
    .btn-gen:hover { background: var(--yello-d); }
    .btn-gen:active { transform: scale(.98); }

    /* ── Preview panel ──────────────────────── */
    .prev {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      gap: 1.25rem;
      background: var(--g2);
      position: relative;
    }
    .prev-tag {
      position: absolute;
      top: .7rem; left: 1rem;
      font-size: .58rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--g4);
    }

    /* Checkerboard = transparency indicator */
    .canvas-shell {
      background:
        linear-gradient(45deg, #d0d0d0 25%, transparent 25%),
        linear-gradient(-45deg,#d0d0d0 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #d0d0d0 75%),
        linear-gradient(-45deg,transparent 75%, #d0d0d0 75%);
      background-size: 14px 14px;
      background-position: 0 0, 0 7px, 7px -7px, -7px 0;
      background-color: #ffffff;
      padding: 1.5rem;
      border: 3px solid var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      max-width: 100%;
    }
    #stampCanvas {
      display: block;
      max-width: min(100%, 480px);
      max-height: 55vh;
      image-rendering: crisp-edges;
    }

    /* ── Action buttons ─────────────────────── */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .5rem;
      width: 100%;
      max-width: 440px;
    }
    .btn-act {
      padding: .6rem .4rem;
      background: transparent;
      border: 2px solid var(--yellow);
      color: var(--yellow);
      font-family: inherit;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .13em;
      cursor: pointer;
      transition: all .1s;
    }
    .btn-act:hover { background: var(--yellow); color: var(--black); }
    .btn-act:active { transform: scale(.97); }

    /* ── Toast ──────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 1.75rem;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--yellow);
      color: var(--black);
      padding: .45rem 1.4rem;
      font-weight: 700;
      font-size: .8rem;
      letter-spacing: .1em;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      z-index: 99;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Color swatches ─────────────────────── */
    .opts-color { display: flex; flex-wrap: wrap; gap: .35rem; }
    .opt-color {
      display: flex;
      align-items: center;
      gap: .4rem;
      padding: .3rem .55rem;
      background: var(--g2);
      border: 2px solid var(--g3);
      color: var(--white);
      font-family: inherit;
      font-size: .78rem;
      cursor: pointer;
      transition: border-color .1s, background .1s, color .1s;
      white-space: nowrap;
    }
    .opt-color:hover { border-color: var(--yellow); }
    .opt-color.active {
      background: var(--yellow);
      border-color: var(--yellow);
      color: var(--black);
      font-weight: 700;
    }
    .opt-color .dot {
      width: 12px; height: 12px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,.18);
    }
    .opt-color.active .dot { border-color: rgba(0,0,0,.25); }
    /* Custom color row */
    .color-custom-row {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-top: .1rem;
    }
    .color-custom-row label {
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .2em;
      color: var(--yellow);
      white-space: nowrap;
    }
    #customColor {
      width: 36px; height: 28px;
      padding: 0;
      border: 2px solid var(--g3);
      background: none;
      cursor: pointer;
      flex-shrink: 0;
    }
    #customColor::-webkit-color-swatch-wrapper { padding: 2px; }
    #customColor::-webkit-color-swatch { border: none; }
    #customColorHex {
      flex: 1;
      background: var(--g2);
      border: 2px solid var(--g3);
      color: var(--white);
      font-family: inherit;
      font-size: .78rem;
      padding: .25rem .4rem;
      letter-spacing: .08em;
      min-width: 0;
      transition: border-color .12s;
    }
    #customColorHex:focus { outline: none; border-color: var(--yellow); }

    /* ── Responsive ─────────────────────────── */
    @media (max-width: 760px) {
      .main { grid-template-columns: 1fr; }
      .ctrl { border-right: none; border-bottom: 3px solid var(--g3); }
      .prev { padding: 1.5rem 1rem; min-height: 320px; }
    }
    @media (max-width: 420px) {
      .hdr { flex-direction: column; gap: .2rem; }
      .actions { grid-template-columns: 1fr; }
      .canvas-shell { padding: 1rem; }
    }
  </style>
</head>
<body>

<header class="hdr">
  <h1>老師印章產生器</h1>
  <small>TEACHER STAMP GENERATOR</small>
</header>

<div class="main">

  <!-- ════ Controls ════ -->
  <aside class="ctrl">
    <div class="ctrl-inner">

      <div class="field">
        <span class="fl">印章文字</span>
        <textarea id="stampText" placeholder="輸入文字&#10;換行可多行排列" rows="3">優良</textarea>
      </div>

      <div class="div"></div>

      <div class="field">
        <span class="fl">排列方式</span>
        <div class="opts" id="layoutOpts"></div>
      </div>

      <div class="field">
        <span class="fl">外框類型</span>
        <div class="opts" id="frameOpts"></div>
      </div>

      <div class="field">
        <span class="fl">字型</span>
        <div class="opts" id="fontOpts"></div>
      </div>

      <div class="field">
        <span class="fl">墨水顏色</span>
        <div class="opts-color" id="colorOpts"></div>
        <div class="color-custom-row">
          <label for="customColor">自訂</label>
          <input type="color" id="customColor" value="#CC1A1A">
          <input type="text"  id="customColorHex" value="#CC1A1A" maxlength="7" spellcheck="false">
        </div>
      </div>

      <div class="div"></div>

      <div class="field">
        <span class="fl">印章大小</span>
        <div class="slide-row">
          <input type="range" id="sSize" min="80" max="520" value="200" step="10">
          <span class="slide-val"><span id="sSizeV">200</span>px</span>
        </div>
      </div>

      <div class="field">
        <span class="fl">蓋印效果強度</span>
        <div class="slide-row">
          <input type="range" id="sEffect" min="0" max="100" value="50" step="5">
          <span class="slide-val"><span id="sEffectV">50</span>%</span>
        </div>
      </div>

      <div class="field">
        <span class="fl">歪斜強度</span>
        <div class="slide-row">
          <input type="range" id="sTilt" min="0" max="100" value="40" step="5">
          <span class="slide-val"><span id="sTiltV">40</span>%</span>
        </div>
      </div>

      <div class="field">
        <span class="fl">行距</span>
        <div class="slide-row">
          <input type="range" id="sLineSpace" min="80" max="200" value="100" step="5">
          <span class="slide-val"><span id="sLineSpaceV">100</span>%</span>
        </div>
      </div>

      <div class="field">
        <span class="fl">邊距</span>
        <div class="slide-row">
          <input type="range" id="sMargin" min="0" max="300" value="100" step="10">
          <span class="slide-val"><span id="sMarginV">100</span>%</span>
        </div>
      </div>

      <div class="div"></div>

      <button class="btn-gen" id="genBtn">▶ 重新生成印章</button>

    </div>
  </aside>

  <!-- ════ Preview ════ -->
  <section class="prev">
    <span class="prev-tag">預覽 PREVIEW — 去背透明 PNG</span>
    <div class="canvas-shell">
      <canvas id="stampCanvas"></canvas>
    </div>
    <div class="actions">
      <button class="btn-act" id="copyBtn">⊕ 複製到剪貼簿</button>
      <button class="btn-act" id="dlBtn">↓ 下載透明 PNG</button>
    </div>
  </section>

</div>

<div class="toast" id="toast"></div>

<script>
/* ================================================================
   設定區域：可直接修改 FONTS / FRAMES / LAYOUTS / STAMP_COLOR
   ================================================================ */

const FONTS = [
  { id: "kaiti",  name: "標楷體", family: "'Times New Roman', Times, 'PT Serif', '標楷體', 'DFKai-SB', 'BiauKai', 'TW-Kai-98_1', serif" },
  { id: "mincho", name: "明體",   family: "'細明體', 'PMingLiU', 'MingLiU', serif" },
];

const FRAMES = [
  { id: "rectangle",    name: "矩框"   },
  { id: "square",       name: "方框"   },
  { id: "stadium",      name: "長條形" },
  { id: "circle",       name: "圓框"   },
  { id: "oval",         name: "橢圓框" },
  { id: "superellipse", name: "超橢圓" },
  { id: "none",         name: "無框"   },
];

const LAYOUTS = [
  { id: "horizontal", name: "從左至右" },
  { id: "vertical",   name: "從上至下" },
];

const INK_COLORS = [
  { id: "red",    name: "硃紅", hex: "#CC1A1A" },
  { id: "blue",   name: "深藍", hex: "#1A3ACC" },
  { id: "black",  name: "碳黑", hex: "#1C1C1C" },
  // { id: "green",  name: "翠綠", hex: "#1A7A3C" },
  { id: "purple", name: "靛紫", hex: "#5A1ACC" },
  // { id: "brown",  name: "棕褐", hex: "#7A3A10" },
];

/* ================================================================
   狀態
   ================================================================ */

const st = { layout: "horizontal", frame: "rectangle", font: FONTS[0].id, color: "red" };

/* ================================================================
   UI 建構
   ================================================================ */

function buildOpts(id, items, key) {
  const wrap = document.getElementById(id);
  items.forEach(item => {
    const b = document.createElement('button');
    b.className = 'opt' + (st[key] === item.id ? ' active' : '');
    b.textContent = item.name;
    b.addEventListener('click', () => {
      st[key] = item.id;
      wrap.querySelectorAll('.opt').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      generate();
    });
    wrap.appendChild(b);
  });
}
buildOpts('layoutOpts', LAYOUTS, 'layout');
buildOpts('frameOpts',  FRAMES,  'frame');
buildOpts('fontOpts',   FONTS,   'font');

/* ── Colour swatches ── */
function buildColorOpts() {
  const wrap = document.getElementById('colorOpts');
  INK_COLORS.forEach(ink => {
    const b = document.createElement('button');
    b.className = 'opt-color' + (st.color === ink.id ? ' active' : '');
    b.dataset.id = ink.id;
    // b.innerHTML = `<span class="dot" style="background:${ink.hex}"></span>${ink.name}`;
    b.innerHTML = `${ink.name}`;
    b.addEventListener('click', () => {
      st.color = ink.id;
      wrap.querySelectorAll('.opt-color').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      // Sync custom inputs to selected preset
      document.getElementById('customColor').value    = ink.hex;
      document.getElementById('customColorHex').value = ink.hex;
      generate();
    });
    wrap.appendChild(b);
  });
}
buildColorOpts();

/* ── Custom colour inputs ── */
function applyCustomColor(hex) {
  if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
  st.color = 'custom';
  document.getElementById('customColor').value    = hex;
  document.getElementById('customColorHex').value = hex;
  document.querySelectorAll('#colorOpts .opt-color').forEach(x => x.classList.remove('active'));
  generate();
}
document.getElementById('customColor').addEventListener('input', e => {
  applyCustomColor(e.target.value);
});
document.getElementById('customColorHex').addEventListener('input', e => {
  applyCustomColor(e.target.value.trim());
});
document.getElementById('customColorHex').addEventListener('blur', e => {
  // Auto-prepend # if missing
  let v = e.target.value.trim();
  if (/^[0-9a-fA-F]{6}$/.test(v)) applyCustomColor('#' + v);
});

function slider(id, valId, unit, cb) {
  const el  = document.getElementById(id);
  const val = document.getElementById(valId);
  el.addEventListener('input', () => { val.textContent = el.value; cb && cb(); });
}
slider('sSize',      'sSizeV',      'px', generate);
slider('sEffect',    'sEffectV',    '%',  generate);
slider('sTilt',      'sTiltV',      '%',  generate);
slider('sLineSpace', 'sLineSpaceV', '%',  generate);
slider('sMargin',    'sMarginV',    '%',  generate);

document.getElementById('stampText').addEventListener('input', generate);
document.getElementById('genBtn').addEventListener('click', () => {
  generate(true); // force new random seed
});
document.getElementById('copyBtn').addEventListener('click', copyStamp);
document.getElementById('dlBtn').addEventListener('click', downloadStamp);

/* ================================================================
   印章生成入口
   ================================================================ */

let lastSeed = 0;

function generate(newSeed = false) {
  const text  = document.getElementById('stampText').value;
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  if (!lines.length) return;

  if (newSeed || lastSeed === 0) lastSeed = (Math.random() * 0xFFFFFF | 0) + 1;

  const size        = +document.getElementById('sSize').value;
  const effect      = +document.getElementById('sEffect').value / 100;
  const tilt        = +document.getElementById('sTilt').value / 100;
  const lineSpacing = +document.getElementById('sLineSpace').value / 100;
  const margin      = +document.getElementById('sMargin').value / 100;
  const font        = FONTS.find(f => f.id === st.font);

  // Resolve current ink colour
  const stampColor = st.color === 'custom'
    ? document.getElementById('customColor').value
    : (INK_COLORS.find(c => c.id === st.color)?.hex ?? '#CC1A1A');

  drawStamp(document.getElementById('stampCanvas'), {
    lines,
    layout:      st.layout,
    frame:       st.frame,
    fontFam:     font.family,
    size,
    effect,
    tilt,
    seed:        lastSeed,
    lineSpacing,
    margin,
    stampColor,
  });
}

/* ================================================================
   核心渲染
   ================================================================ */

function drawStamp(canvas, { lines, layout, frame, fontFam, size, effect, tilt, seed, lineSpacing, margin, stampColor }) {
  /* ── Dimensions ─────────────────────────────────────── */
  const maxLineLen = Math.max(...lines.map(l => [...l].length));
  const numLines   = lines.length;

  // cols / rows in logical grid
  const cols = layout === 'horizontal' ? maxLineLen : numLines;
  const rows = layout === 'horizontal' ? numLines   : maxLineLen;

  // Padding ratio and base font size
  const PRAT   = Math.min(0.45, 0.13 * margin);
  const maxDim = Math.max(cols, rows, 1);
  let fsize    = (size * (1 - PRAT * 2)) / maxDim;
  fsize = Math.max(10, Math.min(fsize, 220));

  const charSize = fsize * 0.83;

  /* ── Measure actual character widths ─────────────────
     Use a temporary off-screen canvas so we can measure
     before we know the final stamp dimensions.          */
  const tmpC = document.createElement('canvas');
  const tmpX = tmpC.getContext('2d');
  tmpX.font = `bold ${charSize}px ${fontFam}`;

  // colWidths[c] = pixel width of the widest character in column c
  let colWidths;
  if (layout === 'horizontal') {
    colWidths = new Array(cols).fill(0);
    lines.forEach(line => {
      [...line].forEach((ch, c) => {
        colWidths[c] = Math.max(colWidths[c], tmpX.measureText(ch).width);
      });
    });
  } else {
    // vertical: each line becomes one column; width = widest char in that line
    colWidths = lines.map(line => {
      if (!line) return charSize;
      let maxW = 0;
      [...line].forEach(ch => { maxW = Math.max(maxW, tmpX.measureText(ch).width); });
      return maxW || charSize;
    });
  }

  // Fallback for empty cells
  colWidths = colWidths.map(w => w || charSize * 0.5);

  /* ── Accumulate column x-offsets ────────────────────── */
  const colOffsets = [];
  let xAcc = 0;
  colWidths.forEach(w => { colOffsets.push(xAcc); xAcc += w; });

  /* ── Row height (apply line-spacing) ────────────────── */
  const rowH = fsize * lineSpacing;

  /* ── Stamp canvas dimensions ────────────────────────── */
  const contentW = colWidths.reduce((s, w) => s + w, 0);
  const contentH = rowH * rows;
  const PPAD     = size * 0.13 * margin;   // absolute padding in px

  let sW = contentW + PPAD * 2;
  let sH = contentH + PPAD * 2;

  if (frame === 'square' || frame === 'circle') {
    sW = sH = Math.max(sW, sH);
  }

  /* ── Canvas setup with rotation buffer ──────────────── */
  const maxRotDeg = 4 * tilt;
  const rotAngle  = ((Math.random() * 2 - 1) * maxRotDeg) * (Math.PI / 180);
  const ROT_BUF   = 40;

  canvas.width  = Math.ceil(sW + ROT_BUF * 2);
  canvas.height = Math.ceil(sH + ROT_BUF * 2);

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  /* ── Draw with rotation ──────────────────────────────── */
  ctx.save();
  ctx.translate(canvas.width / 2, canvas.height / 2);
  ctx.rotate(rotAngle);
  ctx.translate(-sW / 2, -sH / 2);

  ctx.fillStyle   = stampColor;
  ctx.strokeStyle = stampColor;
  const fw = Math.max(2, fsize * 0.085);
  ctx.lineWidth = fw;
  ctx.lineCap   = 'square';

  /* ── Frame ───────────────────────────────────────────── */
  switch (frame) {
    case 'rectangle':
    case 'square':
      ctx.strokeRect(fw / 2, fw / 2, sW - fw, sH - fw);
      break;

    case 'circle': {
      const r = Math.min(sW, sH) / 2 - fw / 2;
      ctx.beginPath();
      ctx.arc(sW / 2, sH / 2, r, 0, Math.PI * 2);
      ctx.stroke();
      break;
    }

    case 'oval': {
      const rx = sW / 2 - fw / 2;
      const ry = sH / 2 - fw / 2;
      ctx.beginPath();
      ctx.ellipse(sW / 2, sH / 2, rx, ry, 0, 0, Math.PI * 2);
      ctx.stroke();
      break;
    }

    /* ── 長條形：上下邊平行、左右邊為半圓 ── */
    case 'stadium': {
      // r = half the shorter dimension
      const r = Math.min(sW, sH) / 2 - fw / 2;
      if (sW >= sH) {
        // Landscape: flat top/bottom, semicircles on left/right
        const cx1 = r + fw / 2;          // centre of left semicircle
        const cx2 = sW - r - fw / 2;     // centre of right semicircle
        ctx.beginPath();
        ctx.moveTo(cx1, fw / 2);          // top-left join
        ctx.lineTo(cx2, fw / 2);          // top edge →
        ctx.arc(cx2, sH / 2, r, -Math.PI / 2, Math.PI / 2);   // right cap ↓
        ctx.lineTo(cx1, sH - fw / 2);    // bottom edge ←
        ctx.arc(cx1, sH / 2, r, Math.PI / 2, 3 * Math.PI / 2); // left cap ↑
        ctx.closePath();
        ctx.stroke();
      } else {
        // Portrait: flat left/right, semicircles on top/bottom
        const cy1 = r + fw / 2;
        const cy2 = sH - r - fw / 2;
        ctx.beginPath();
        ctx.moveTo(fw / 2, cy1);
        ctx.lineTo(fw / 2, cy2);
        ctx.arc(sW / 2, cy2, r, Math.PI, 0);
        ctx.lineTo(sW - fw / 2, cy1);
        ctx.arc(sW / 2, cy1, r, 0, -Math.PI);
        ctx.closePath();
        ctx.stroke();
      }
      break;
    }

    /* ── 超橢圓：|x/a|^2.5 + |y/b|^2.5 = 1 ── */
    case 'superellipse': {
      const a   = sW / 2 - fw / 2;
      const b   = sH / 2 - fw / 2;
      const exp = 2 / 2.5;   // = 0.8
      const N   = 400;
      ctx.beginPath();
      for (let i = 0; i <= N; i++) {
        const t   = (i / N) * Math.PI * 2;
        const cos = Math.cos(t);
        const sin = Math.sin(t);
        const x   = sW / 2 + a * Math.sign(cos) * Math.pow(Math.abs(cos), exp);
        const y   = sH / 2 + b * Math.sign(sin) * Math.pow(Math.abs(sin), exp);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();
      break;
    }

    case 'none':
      break;
  }

  /* ── Text ────────────────────────────────────────────── */
  ctx.font         = `bold ${charSize}px ${fontFam}`;
  ctx.textBaseline = 'middle';
  ctx.textAlign    = 'center';

  // Content area: horizontally left-padded, vertically centred
  const ox = PPAD;
  const oy = (sH - contentH) / 2;

  const maxCharTilt = 0.055 * tilt;   // per-character tilt range

  if (layout === 'horizontal') {
    lines.forEach((line, row) => {
      const y = oy + rowH * row + rowH / 2;
      [...line].forEach((ch, col) => {
        if (col >= colOffsets.length) return;
        const x   = ox + colOffsets[col] + colWidths[col] / 2;
        const rot = (Math.random() * 2 - 1) * maxCharTilt;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rot);
        ctx.fillText(ch, 0, 0);
        ctx.restore();
      });
    });
  } else {
    lines.forEach((line, col) => {
      if (col >= colOffsets.length) return;
      const x = ox + colOffsets[col] + colWidths[col] / 2;
      [...line].forEach((ch, row) => {
        const y   = oy + rowH * row + rowH / 2;
        const rot = (Math.random() * 2 - 1) * maxCharTilt;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rot);
        ctx.fillText(ch, 0, 0);
        ctx.restore();
      });
    });
  }

  ctx.restore();

  /* ── Ink wear ─────────────────────────────────────────── */
  if (effect > 0) applyInkWear(canvas, ctx, effect, seed);
}

/* ================================================================
   印泥磨損效果（像素操作）
   ================================================================ */

function applyInkWear(canvas, ctx, strength, seed) {
  const W  = canvas.width;
  const H  = canvas.height;
  const id = ctx.getImageData(0, 0, W, H);
  const d  = id.data;

  /* Fast deterministic LCG */
  let s = (seed ^ 0x6F4A3C1E) >>> 0;
  const rand = () => {
    s = (Math.imul(s, 1664525) + 1013904223) >>> 0;
    return s / 4294967296;
  };

  /* Coarse noise grid (large ink-patch variation) */
  const BLOCK = Math.max(5, ((W + H) * 0.045) | 0);
  const bW    = Math.ceil(W / BLOCK);
  const bH    = Math.ceil(H / BLOCK);
  const coarse = new Float32Array(bW * bH);
  for (let i = 0; i < coarse.length; i++) coarse[i] = rand();

  /* Medium noise grid */
  const MBLOCK = Math.max(3, BLOCK >> 1);
  const mW     = Math.ceil(W / MBLOCK);
  const mH     = Math.ceil(H / MBLOCK);
  const mid    = new Float32Array(mW * mH);
  for (let i = 0; i < mid.length; i++) mid[i] = rand();

  /* Fine noise: one value per pixel */
  const fine = new Float32Array(W * H);
  for (let i = 0; i < fine.length; i++) fine[i] = rand();

  /* Thresholds */
  const baseDropout = strength * 0.26;   // fine-grain dropout
  const edgeBoost   = strength * 0.48;   // extra near edges
  const patchAmp    = strength * 0.18;   // coarse patch influence

  for (let pi = 0; pi < W * H; pi++) {
    const a = d[(pi << 2) + 3];
    if (a < 6) continue;

    const x = pi % W;
    const y = (pi / W) | 0;

    /* Edge distance (0 = at edge, 1 = well inside) */
    const ex = Math.min(x, W - 1 - x) / (W * 0.11);
    const ey = Math.min(y, H - 1 - y) / (H * 0.11);
    const edg = 1 - Math.min(1, Math.min(ex, ey));

    /* Noise blend */
    const cn  = coarse[((y / BLOCK | 0) * bW) + (x / BLOCK | 0)];
    const mn  = mid   [((y / MBLOCK| 0) * mW) + (x / MBLOCK| 0)];
    const fn  = fine[pi];

    const thresh = baseDropout
      + edg * edgeBoost
      + (cn - 0.5) * patchAmp
      + (mn - 0.5) * patchAmp * 0.45;

    const i4 = pi << 2;
    if (fn < thresh) {
      d[i4 + 3] = 0;
    } else if (fn < thresh + 0.07) {
      /* Feathered dropout edge */
      const t = (fn - thresh) / 0.07;
      d[i4 + 3] = (a * t * t) | 0;
    } else {
      /* Subtle pressure variation */
      const pv = 1 - strength * 0.12 * (1 - fn);
      d[i4 + 3] = Math.min(255, (a * pv) | 0);
    }
  }

  ctx.putImageData(id, 0, 0);
}

/* ================================================================
   複製 & 下載
   ================================================================ */

async function copyStamp() {
  const canvas = document.getElementById('stampCanvas');
  try {
    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
    toast('已複製到剪貼簿！');
  } catch (e) {
    toast('瀏覽器不支援複製，請使用下載功能');
  }
}

function downloadStamp() {
  const canvas = document.getElementById('stampCanvas');
  const a = document.createElement('a');
  a.download = 'stamp.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
  toast('已下載！');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 2400);
}

/* ================================================================
   初始化
   ================================================================ */

generate(true);
</script>
